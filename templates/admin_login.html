<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Daniel Setiawan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-[#0d1321]/40 border border-slate-800 p-8 rounded-2xl shadow-xl">
        <h1 class="text-xl font-bold font-display tracking-wide uppercase text-white mb-2">Admin Panel</h1>
        <p class="text-xs text-slate-400 mb-6">Silakan masuk untuk mengelola pesan dan portfolio.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="p-3 mb-4 text-xs bg-rose-500/10 text-rose-400 rounded-xl border border-rose-500/20">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="" method="POST" class="space-y-4 text-sm">
            <div>
                <label class="block text-xs text-slate-400 font-mono mb-1.5 uppercase font-bold">Username</label>
                <input type="text" name="username" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
            <div>
                <label class="block text-xs text-slate-400 font-mono mb-1.5 uppercase font-bold">Password</label>
                <input type="password" name="password" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl font-display font-bold transition-all shadow-md cursor-pointer mt-2">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
